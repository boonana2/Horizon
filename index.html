<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1 class="wordmark">Horizon</h1>
      <p class="subtitle">Small games, built one at a time.</p>
    </div>

    <svg class="ridge" viewBox="0 0 1200 260" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <radialGradient id="glow" cx="50%" cy="100%" r="75%">
          <stop offset="0%" stop-color="#FF7A33" stop-opacity="0.5"/>
          <stop offset="45%" stop-color="#FF7A33" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#FF7A33" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="1200" height="150" fill="url(#glow)"/>
      <path d="M0,150 L120,110 L260,140 L420,90 L600,135 L760,100 L940,145 L1100,105 L1200,130 L1200,260 L0,260 Z" fill="#251B23"/>
      <path d="M0,178 L150,150 L330,172 L520,138 L710,168 L900,142 L1080,172 L1200,155 L1200,260 L0,260 Z" fill="#1B1436"/>
      <line x1="0" y1="128" x2="1200" y2="128" stroke="#FF7A33" stroke-width="1" opacity="0.6"/>
    </svg>
  </header>

  <main>
    <section class="grid-section">
      <div class="grid-heading">
        <h2>Games</h2>
        <span class="count" id="game-count">0 live</span>
      </div>

      <div class="grid" id="grid">
        <!-- rendered by script.js -->
      </div>
    </section>

    <section class="empty-note">
      <p>Nothing's live yet &mdash; each tile below is a placeholder until a real game is linked to it.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
