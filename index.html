<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="glow" aria-hidden="true"></div>
    <div class="hero-inner">
      <h1 class="wordmark">Horizon</h1>
      <p class="subtitle">Small games, built one at a time.</p>
    </div>
    <div class="divider" aria-hidden="true"></div>
  </header>

  <main>
    <section class="grid-section">
      <div class="grid-heading">
        <h2>Games</h2>
        <span class="count" id="game-count">0 live</span>
      </div>

      <div class="grid" id="grid">
        <!-- rendered by script.js -->
      </div>
    </section>

    <section class="empty-note">
      <p>Nothing's live yet &mdash; each tile below is a placeholder until a real game is linked to it.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
