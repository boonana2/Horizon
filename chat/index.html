<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon: Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  /* ---------- Chat page (page-specific, layered on top of style.css) ---------- */

  .chat-hero .hero-inner { padding: 3rem 1.5rem 3rem; }

  .chat-shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 1.1rem;
    height: min(640px, 74vh);
    min-height: 420px;
  }

  .panel {
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-head h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    margin: 0;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .icon-btn:hover { border-color: var(--orange); color: var(--orange); }

  .sidebar-tabs {
    display: flex;
    gap: 0.4rem;
    padding: 0.75rem 1.1rem 0;
  }

  .sidebar-tab {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.78rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
  }

  .sidebar-tab.active {
    color: var(--sky-deep);
    background: var(--orange);
    border-color: var(--orange);
  }

  .convo-list {
    list-style: none;
    margin: 0;
    padding: 0.75rem 0.5rem;
    overflow-y: auto;
    flex: 1;
  }

  .convo-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    width: 100%;
    padding: 0.6rem 0.6rem;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-family: var(--font-body);
  }

  .convo-item:hover { background: rgba(255, 122, 51, 0.08); }
  .convo-item.active { background: rgba(255, 122, 51, 0.16); }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--orange);
    flex-shrink: 0;
    position: relative;
  }

  .avatar.online::after {
    content: "";
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #4ADE80;
    border: 2px solid var(--ground);
  }

  .convo-meta { min-width: 0; }
  .convo-name { font-size: 0.88rem; font-weight: 500; }
  .convo-preview {
    font-size: 0.76rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .empty-list-note {
    color: var(--muted);
    font-size: 0.82rem;
    padding: 1rem 0.6rem;
    text-align: center;
  }

  /* Chat window */
  .chat-window { position: relative; }

  .chat-head {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--line);
  }

  .chat-head-name { font-family: var(--font-display); font-weight: 600; font-size: 0.98rem; }
  .chat-head-sub { font-size: 0.76rem; color: var(--muted); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .msg {
    max-width: 72%;
    padding: 0.55rem 0.8rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.4;
  }

  .msg-them {
    align-self: flex-start;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-bottom-left-radius: 3px;
  }

  .msg-me {
    align-self: flex-end;
    background: var(--orange);
    color: var(--sky-deep);
    border-bottom-right-radius: 3px;
  }

  .msg-sender {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 0.15rem;
  }

  .msg-me .msg-sender { display: none; }

  .composer {
    display: flex;
    gap: 0.6rem;
    padding: 0.85rem 1.1rem;
    border-top: 1px solid var(--line);
  }

  .composer input {
    flex: 1;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
  }

  .composer input:focus { outline: none; border-color: var(--orange); }

  .send-btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--sky-deep);
    background: var(--orange);
    border: none;
    border-radius: 8px;
    padding: 0 1.1rem;
    cursor: pointer;
  }

  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .chat-window-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(19, 15, 40, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 1.5rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.5rem;
    width: 100%;
    max-width: 360px;
  }

  .modal h3 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.05rem;
    margin: 0 0 0.9rem;
  }

  .modal label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .modal input {
    width: 100%;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
    margin-bottom: 0.6rem;
  }

  .modal input:focus { outline: none; border-color: var(--orange); }

  .modal-checklist {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.4rem;
    margin-bottom: 0.9rem;
  }

  .modal-check-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.3rem;
    font-size: 0.85rem;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: 0.4rem;
  }

  .btn-ghost {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.85rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .btn-primary {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--sky-deep);
    background: var(--orange);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .modal-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 0.7rem;
  }

  @media (max-width: 720px) {
    .chat-shell {
      grid-template-columns: 1fr;
      height: auto;
    }
    .panel { height: 380px; }
  }
</style>
</head>
<body>
  <nav class="topnav">
    <div class="nav-left">
      <a href="../index.html" class="nav-brand">
        <span class="nav-emoji">🌅</span> Horizon
      </a>
      <a href="../othergames/index.html" class="nav-link">Other Games</a>
    </div>
    <div class="nav-right">
      <a href="../info/index.html" class="nav-link">Info</a>
      <a href="index.html" class="nav-link nav-link-active">Chat</a>
    </div>
  </nav>

  <header class="hero chat-hero">
    <svg class="stars" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <circle cx="55" cy="50" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="120" cy="110" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="1145" cy="55" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="1080" cy="115" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="990" cy="155" r="1.6" fill="#F3EDF7" opacity="0.65"/>
    </svg>
    <div class="glow" aria-hidden="true"></div>
    <div class="hero-inner">
      <h1 class="wordmark" style="font-size: clamp(2.2rem, 7vw, 3.6rem);">Chat</h1>
    </div>
    <div class="divider" aria-hidden="true"></div>
  </header>

  <main>
    <div class="chat-shell">
      <!-- Sidebar: friends + conversations -->
      <div class="panel">
        <div class="sidebar-head">
          <h2>Friends</h2>
          <div style="display:flex; gap:0.4rem;">
            <button class="icon-btn" id="newGroupBtn" title="New group">+G</button>
            <button class="icon-btn" id="addFriendBtn" title="Add friend">+</button>
          </div>
        </div>
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="all">All</button>
          <button class="sidebar-tab" data-tab="requests">Requests</button>
        </div>
        <ul class="convo-list" id="convoList"></ul>
      </div>

      <!-- Chat window -->
      <div class="panel chat-window">
        <div id="chatEmpty" class="chat-window-empty">
          Pick a friend or group on the left to start chatting.
        </div>
        <div id="chatActive" style="display:none; flex-direction:column; height:100%;">
          <div class="chat-head">
            <div class="avatar" id="chatAvatar"></div>
            <div>
              <div class="chat-head-name" id="chatName"></div>
              <div class="chat-head-sub" id="chatSub"></div>
            </div>
          </div>
          <div class="messages" id="messages"></div>
          <div class="composer">
            <input type="text" id="messageInput" placeholder="Message…" autocomplete="off">
            <button class="send-btn" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add friend modal -->
  <div class="modal-overlay" id="addFriendModal">
    <div class="modal">
      <h3>Add a friend</h3>
      <label for="friendCodeInput">Their username or friend code</label>
      <input type="text" id="friendCodeInput" placeholder="e.g. nova#4471">
      <div class="modal-actions">
        <button class="btn-ghost" data-close="addFriendModal">Cancel</button>
        <button class="btn-primary" id="sendRequestBtn">Send request</button>
      </div>
      <p class="modal-note">This UI is a placeholder — wiring it to real accounts requires the backend from the setup guide (auth + D1 + friend request endpoints).</p>
    </div>
  </div>

  <!-- New group modal -->
  <div class="modal-overlay" id="newGroupModal">
    <div class="modal">
      <h3>New group</h3>
      <label for="groupNameInput">Group name</label>
      <input type="text" id="groupNameInput" placeholder="e.g. Weekend Crew">
      <label>Pick friends to add</label>
      <div class="modal-checklist" id="groupChecklist"></div>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="newGroupModal">Cancel</button>
        <button class="btn-primary" id="createGroupBtn">Create group</button>
      </div>
    </div>
  </div>

  <script>
    /*
      Demo data layer.
      -----------------
      Everything below runs entirely in the browser (localStorage) so you can see
      the UI work today. To make it a real chat feature, swap these three spots
      for calls to your backend:

        1. loadState()/saveState()   -> fetch friends/conversations from D1 via a Worker
        2. openConversation()        -> open a WebSocket to that conversation's Durable Object
        3. sendMessage()             -> ws.send(...) instead of pushing into local state

      The message list, sidebar, and modals are already wired to a single `state`
      object, so once messages arrive over a real WebSocket you just push them
      into state.conversations[id].messages and call renderMessages() again.
    */

    const STORAGE_KEY = 'horizon-chat-demo-state';

    const seedState = {
      me: { id: 'me', name: 'You' },
      friends: [
        { id: 'f1', name: 'Rae', online: true },
        { id: 'f2', name: 'Jules', online: false },
        { id: 'f3', name: 'Sam', online: true }
      ],
      requests: [
        { id: 'r1', name: 'Kit' }
      ],
      conversations: [
        {
          id: 'c1', type: 'dm', name: 'Rae', memberIds: ['f1'],
          messages: [
            { sender: 'Rae', text: 'hey, you free to play tonight?' },
            { sender: 'me', text: 'yeah, give me 10 min' }
          ]
        },
        {
          id: 'c2', type: 'dm', name: 'Jules', memberIds: ['f2'],
          messages: [ { sender: 'Jules', text: 'gg last night' } ]
        },
        {
          id: 'c3', type: 'group', name: 'Weekend Crew', memberIds: ['f1', 'f3'],
          messages: [
            { sender: 'Sam', text: 'group chat is live 🎉' },
            { sender: 'Rae', text: 'nice' }
          ]
        }
      ]
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(seedState);
      } catch {
        return structuredClone(seedState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = loadState();
    let activeConvoId = null;
    let activeTab = 'all';

    const convoList = document.getElementById('convoList');
    const chatEmpty = document.getElementById('chatEmpty');
    const chatActive = document.getElementById('chatActive');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');

    function initials(name) {
      return name.trim().slice(0, 2).toUpperCase();
    }

    function isOnline(convo) {
      if (convo.type !== 'dm') return false;
      const friend = state.friends.find(f => f.id === convo.memberIds[0]);
      return !!(friend && friend.online);
    }

    function renderSidebar() {
      convoList.innerHTML = '';

      if (activeTab === 'requests') {
        if (state.requests.length === 0) {
          convoList.innerHTML = '<li class="empty-list-note">No pending requests.</li>';
          return;
        }
        state.requests.forEach(req => {
          const li = document.createElement('li');
          li.className = 'convo-item';
          li.innerHTML = `
            <div class="avatar">${initials(req.name)}</div>
            <div class="convo-meta" style="flex:1;">
              <div class="convo-name">${req.name}</div>
              <div class="convo-preview">wants to be friends</div>
            </div>`;
          const acceptBtn = document.createElement('button');
          acceptBtn.className = 'icon-btn';
          acceptBtn.textContent = '✓';
          acceptBtn.title = 'Accept';
          acceptBtn.onclick = (e) => { e.stopPropagation(); acceptRequest(req.id); };
          li.appendChild(acceptBtn);
          convoList.appendChild(li);
        });
        return;
      }

      if (state.conversations.length === 0) {
        convoList.innerHTML = '<li class="empty-list-note">No conversations yet. Add a friend to get started.</li>';
        return;
      }

      state.conversations.forEach(convo => {
        const last = convo.messages[convo.messages.length - 1];
        const li = document.createElement('li');
        li.className = 'convo-item' + (convo.id === activeConvoId ? ' active' : '');
        li.innerHTML = `
          <div class="avatar${isOnline(convo) ? ' online' : ''}">${initials(convo.name)}</div>
          <div class="convo-meta">
            <div class="convo-name">${convo.name}${convo.type === 'group' ? ' · group' : ''}</div>
            <div class="convo-preview">${last ? (last.sender === 'me' ? 'You: ' : '') + last.text : 'Say hi 👋'}</div>
          </div>`;
        li.onclick = () => openConversation(convo.id);
        convoList.appendChild(li);
      });
    }

    function openConversation(id) {
      activeConvoId = id;
      const convo = state.conversations.find(c => c.id === id);
      if (!convo) return;

      chatEmpty.style.display = 'none';
      chatActive.style.display = 'flex';

      document.getElementById('chatAvatar').textContent = initials(convo.name);
      document.getElementById('chatName').textContent = convo.name;
      document.getElementById('chatSub').textContent =
        convo.type === 'group' ? `${convo.memberIds.length + 1} members` : (isOnline(convo) ? 'Online' : 'Offline');

      renderMessages();
      renderSidebar();

      // TODO: replace the local-state read above with opening a WebSocket:
      // const ws = new WebSocket(`wss://your-worker.example.com/room/${id}`);
      // ws.onmessage = (evt) => { pushIncomingMessage(id, JSON.parse(evt.data)); };
    }

    function renderMessages() {
      const convo = state.conversations.find(c => c.id === activeConvoId);
      if (!convo) return;
      messagesEl.innerHTML = '';
      convo.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.sender === 'me' ? 'msg-me' : 'msg-them');
        div.innerHTML = (m.sender === 'me' ? '' : `<div class="msg-sender">${m.sender}</div>`) +
          escapeHtml(m.text);
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !activeConvoId) return;
      const convo = state.conversations.find(c => c.id === activeConvoId);
      convo.messages.push({ sender: 'me', text });
      messageInput.value = '';
      saveState();
      renderMessages();
      renderSidebar();

      // TODO: replace with ws.send(JSON.stringify({ type: 'message', content: text }))
    }

    function acceptRequest(reqId) {
      const req = state.requests.find(r => r.id === reqId);
      if (!req) return;
      state.requests = state.requests.filter(r => r.id !== reqId);
      const friendId = req.id.replace('r', 'f');
      state.friends.push({ id: friendId, name: req.name, online: false });
      state.conversations.push({ id: 'c' + friendId, type: 'dm', name: req.name, memberIds: [friendId], messages: [] });
      saveState();
      activeTab = 'all';
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'all'));
      renderSidebar();

      // TODO: replace with a POST to your friend-request-accept endpoint
    }

    document.querySelectorAll('.sidebar-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderSidebar();
      });
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Modals
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.getElementById('addFriendBtn').addEventListener('click', () => openModal('addFriendModal'));
    document.getElementById('newGroupBtn').addEventListener('click', () => {
      const list = document.getElementById('groupChecklist');
      list.innerHTML = '';
      state.friends.forEach(f => {
        const row = document.createElement('label');
        row.className = 'modal-check-row';
        row.innerHTML = `<input type="checkbox" value="${f.id}"> ${f.name}`;
        list.appendChild(row);
      });
      openModal('newGroupModal');
    });

    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });

    document.getElementById('sendRequestBtn').addEventListener('click', () => {
      const input = document.getElementById('friendCodeInput');
      if (!input.value.trim()) return;
      // TODO: POST { code: input.value } to your friend-request endpoint instead of this alert
      alert('Friend request UI only — connect this to your backend to actually send requests.');
      input.value = '';
      closeModal('addFriendModal');
    });

    document.getElementById('createGroupBtn').addEventListener('click', () => {
      const name = document.getElementById('groupNameInput').value.trim();
      const checked = Array.from(document.querySelectorAll('#groupChecklist input:checked')).map(c => c.value);
      if (!name || checked.length === 0) return;
      const id = 'g' + Date.now();
      state.conversations.push({ id, type: 'group', name, memberIds: checked, messages: [] });
      saveState();
      document.getElementById('groupNameInput').value = '';
      closeModal('newGroupModal');
      renderSidebar();
      openConversation(id);

      // TODO: replace with a POST that creates the conversation row + a fresh Durable Object
    });

    renderSidebar();
  </script>
</body>
</html>
